<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ffxiv-trader — maps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>

<header data-component="topbar" data-active="maps"></header>
<div data-component="taxbar"></div>

<div class="page-head">
  <h1>Maps</h1>
  <span class="sub">Daily-obtainable treasure maps. Live prices.</span>
</div>

<div class="filters controls">
  <button class="btn" id="cols-filters-btn" type="button" data-context="opps" title="Columns &amp; filters">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
    Columns &amp; filters
  </button>
  <input type="search" id="search" class="search-input" placeholder="Search…" aria-label="Search this page">
  <span id="status" class="dim"></span>
  <div class="spacer"></div>
  <button class="btn refresh" id="refresh" title="Refresh map data" aria-label="Refresh">
    <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"></polyline>
      <polyline points="1 20 1 14 7 14"></polyline>
      <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"></path>
    </svg>
  </button>
</div>

<main>
  <div class="table-wrap">
    <table class="data" id="maps">
      <thead>
        <tr>
          <th class="col-icon" title="Item icon"></th>
          <th class="col-item" title="Map name (click to open wiki)">Item</th>
          <th class="col-world" title="Cheapest rival world to buy from">Buy World</th>
          <th class="col-price num" data-sort="buy_price" title="Best buy price on DC">Buy <span class="arrow"></span></th>
          <th class="col-world" title="Your home world">Sell World</th>
          <th class="col-price num" data-sort="sell_price" title="Current best home-world listing">Sell <span class="arrow"></span></th>
          <th class="col-profit num" data-sort="profit" title="sell × (1 − tax) − buy">Profit <span class="arrow"></span></th>
          <th class="col-roi num" data-sort="roi_pct" title="profit / buy × 100">ROI% <span class="arrow"></span></th>
          <th class="col-velocity num" data-sort="velocity" title="Sales per day">Sales/d <span class="arrow"></span></th>
          <th class="col-pday num" data-sort="profit_per_day" title="profit × sales/day">Profit/d <span class="arrow"></span></th>
          <th class="col-spread num" data-sort="spread_pct" title="(sell − recent actual sale) / recent sale × 100.">Spread% <span class="arrow"></span></th>
          <th class="col-depth num" data-sort="top_depth" title="Quantity in cheapest current listing on home world.">Depth <span class="arrow"></span></th>
          <th class="col-gap num" data-sort="undercut_gap" title="(2nd cheapest − cheapest) / cheapest × 100.">Gap% <span class="arrow"></span></th>
          <th class="col-time" data-sort="recent_purchase_ts" title="Time since the most recent actual sale on home world">Last Sale <span class="arrow"></span></th>
          <th class="col-time" data-sort="updated" title="Time since home world last uploaded">Updated <span class="arrow"></span></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</main>

<script src="/js/partials.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/common.js"></script>
<script src="/js/alerts.js"></script>
<script src="/js/item-detail.js"></script>
<script src="/js/tax.js"></script>
<script src="/js/rescan-timer.js"></script>
<script src="/js/settings.js"></script>
<script src="/js/cols-filters.js"></script>
<script src="/js/search.js"></script>
<script src="/js/maps.js"></script>
<script>
  window.addEventListener('ft-rescan-all', () => {
    document.querySelector('#refresh')?.click?.();
  });
</script>
</body>
</html>
