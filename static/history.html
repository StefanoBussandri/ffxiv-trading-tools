<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ffxiv-trader — history</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>

<header data-component="topbar" data-active="history"></header>
<div data-component="taxbar"></div>

<div class="page-head">
  <h1>History</h1>
  <span class="sub">Items that have shown up in past scans.</span>
</div>

<div class="filters controls">
  <label>Days
    <input type="number" id="days" min="1" max="365" value="7">
  </label>
  <label>Source
    <select id="source">
      <option value="all">All</option>
      <option value="cross-world">Cross-world</option>
      <option value="vendor">Vendor</option>
    </select>
  </label>
  <button class="btn" id="cols-filters-btn" type="button" data-context="history" title="Columns &amp; filters">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
    Columns &amp; filters
  </button>
  <input type="search" id="search" class="search-input" placeholder="Search…" aria-label="Search this page">
  <span id="status" class="dim"></span>
  <div class="spacer"></div>
  <button class="btn" id="reload" title="Reload">Reload</button>
</div>

<main>
  <div class="table-wrap">
    <table class="data" id="hist">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
</main>

<script src="/js/partials.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/common.js"></script>
<script src="/js/alerts.js"></script>
<script src="/js/item-detail.js"></script>
<script src="/js/tax.js"></script>
<script src="/js/rescan-timer.js"></script>
<script src="/js/settings.js"></script>
<script src="/js/cols-filters.js"></script>
<script src="/js/search.js"></script>
<script src="/js/history.js"></script>
</body>
</html>
