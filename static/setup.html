<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ffxiv-trader — setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/css/app.css">
<style>
  body {
    min-height: 100vh; margin: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1100px 560px at 50% -10%, #141a24, var(--bg-0));
    padding: 32px 16px; box-sizing: border-box;
  }
  .setup-card {
    width: 100%; max-width: 440px;
    background: var(--bg-1);
    border: 1px solid var(--border-strong);
    border-radius: 16px;
    padding: 30px 32px 26px;
    box-shadow: 0 24px 60px rgba(0, 0, 0, .55);
  }

  .setup-card h1 { margin: 0 0 4px; font-size: 20px; color: var(--fg); }
  .setup-intro {
    margin: 0 0 20px; font-size: 13px; color: var(--dim); line-height: 1.5;
  }
  .setup-field { margin-bottom: 14px; }
  .setup-field label {
    display: block; font-size: 11px; color: var(--dim);
    margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em;
  }
  .setup-field select,
  .setup-field input {
    width: 100%; box-sizing: border-box;
    background: var(--bg-2); color: var(--fg);
    border: 1px solid var(--border-strong); border-radius: 8px;
    padding: 9px 10px; font-size: 14px; font-family: inherit;
  }
  .setup-field select:focus,
  .setup-field input:focus { outline: none; border-color: var(--accent); }
  .setup-row { display: flex; gap: 12px; }
  .setup-row .setup-field { flex: 1; }
  .setup-submit {
    width: 100%; margin-top: 8px;
    background: linear-gradient(135deg, var(--accent), #c79333);
    color: #1a1208; font-weight: 600; font-size: 14px;
    border: 0; border-radius: 8px; padding: 11px; cursor: pointer;
  }
  .setup-submit:disabled { opacity: .55; cursor: not-allowed; }
  .setup-error {
    color: var(--negative); font-size: 12px; margin: 8px 0 0; min-height: 1em;
  }
  .setup-progress {
    color: var(--dim); font-size: 11.5px; margin: 14px 0 0;
    text-align: center; line-height: 1.7;
  }
  .setup-progress .ok { color: var(--positive); }
  .setup-progress .bad { color: var(--negative); }
  .setup-progress .wait { opacity: .5; }
</style>
</head>
<body>
<form class="setup-card" id="setup-form" autocomplete="off">
  <h1>Welcome to ffxiv-trader</h1>
  <p class="setup-intro">
    Pick your server so prices are calculated for you. Everything here is
    changeable later via the gear icon.
  </p>

  <div class="setup-field">
    <label for="data_center">Data Center</label>
    <select id="data_center" required></select>
  </div>
  <div class="setup-field">
    <label for="home_world">Home World</label>
    <select id="home_world" required></select>
  </div>
  <div class="setup-field">
    <label for="tax_city">Tax City</label>
    <select id="tax_city" required></select>
  </div>
  <div class="setup-row">
    <div class="setup-field">
      <label for="retainer_count">Retainers</label>
      <input type="number" id="retainer_count" min="1" max="20" value="2" required>
    </div>
    <div class="setup-field">
      <label for="budget">Budget (gil/unit)</label>
      <input type="number" id="budget" min="0" step="1000" value="500000" required>
    </div>
  </div>

  <p class="setup-error" id="setup-error"></p>
  <button type="submit" class="setup-submit" id="setup-submit">Start trading</button>
  <p class="setup-progress" id="setup-progress"></p>
</form>
<script src="/js/setup.js"></script>
<script>
  // Minimal heartbeat for the setup screen — common.js is not loaded here
  // (it would redirect us back to setup on first run via the boot guard),
  // but the desktop launcher's watchdog still expects beacons. Without
  // this, leaving the setup page open long enough would shut the app down
  // mid-config. Kept inline to dodge an extra round-trip on first launch.
  (function () {
    function ping() {
      try {
        if (navigator.sendBeacon) navigator.sendBeacon('/heartbeat');
        else fetch('/heartbeat', { method: 'POST', keepalive: true }).catch(() => {});
      } catch (e) { /* best-effort */ }
    }
    ping();
    setInterval(ping, 10000);
  })();
</script>
</body>
</html>
