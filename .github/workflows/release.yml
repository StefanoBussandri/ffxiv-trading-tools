name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install runtime + build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: pyinstaller ffxiv-trader.spec --noconfirm --clean

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if (-not $ref) { $ref = "dev" }
          "version=$ref" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Zip release folder
        shell: pwsh
        run: |
          $zip = "FFXIV-Trader-${{ steps.version.outputs.version }}-windows.zip"
          # Re-parent the build output under a space-free folder so the zip
          # extracts cleanly. End users see "FFXIV Trader" as the app name via
          # the exe + window title; the folder/zip stay shell-friendly.
          Rename-Item -Path "dist/FFXIV Trader" -NewName "FFXIV-Trader"
          Compress-Archive -Path "dist/FFXIV-Trader" -DestinationPath $zip
          "artifact=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffxiv-trader-windows
          path: ${{ steps.zip.outputs.artifact }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.artifact }}
          generate_release_notes: true
